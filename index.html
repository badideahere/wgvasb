  <title>blank</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #000;
      font-family: monospace;
      color: #aaa;
      padding: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
      max-width: 900px;
      margin: 0 auto;
    }
    .slot {
      border: 1px solid #333;
      padding: 14px 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color 0.15s, color 0.15s;
    }
    .slot:hover { border-color: #555; color: #ddd; }
    .slot-title { font-size: 12px; color: #ccc; }
    .slot-desc { font-size: 10px; color: #555; }
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 999;
    }
    #modal.open { display: block; }
    #closeBtn {
      position: fixed;
      top: 12px;
      right: 12px;
      background: #000;
      border: 1px solid #333;
      color: #aaa;
      font-family: monospace;
      font-size: 12px;
      padding: 7px 14px;
      cursor: pointer;
      z-index: 1000;
      transition: border-color 0.15s, color 0.15s;
    }
    #closeBtn:hover { border-color: #555; color: #ddd; }
    #fsBtn {
      position: fixed;
      top: 12px;
      right: 100px;
      background: #000;
      border: 1px solid #333;
      color: #aaa;
      font-family: monospace;
      font-size: 12px;
      padding: 7px 14px;
      cursor: pointer;
      z-index: 1000;
      transition: border-color 0.15s, color 0.15s;
    }
    #fsBtn:hover { border-color: #555; color: #ddd; }
    #gameFrame { width: 100vw; height: 100vh; border: none; display: block; }
  </style>
</head>

  <div id="modal">
    <button id="fsBtn" onclick="goFullscreen()">fullscreen</button>
    <button id="closeBtn" onclick="closeGame()">close</button>
    <iframe id="gameFrame" src="" allowfullscreen></iframe>
  </div>

  <script>
    function openGame(url) {
      document.getElementById("gameFrame").src = url;
      document.getElementById("modal").classList.add("open");
      const modal = document.getElementById("modal");
      if (modal.requestFullscreen) modal.requestFullscreen();
      else if (modal.webkitRequestFullscreen) modal.webkitRequestFullscreen();
    }
    function goFullscreen() {
      const modal = document.getElementById("modal");
      if (modal.requestFullscreen) modal.requestFullscreen();
      else if (modal.webkitRequestFullscreen) modal.webkitRequestFullscreen();
    }
    function closeGame() {
      document.getElementById("gameFrame").src = "";
      document.getElementById("modal").classList.remove("open");
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
  </script>
